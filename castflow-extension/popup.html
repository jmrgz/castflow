<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CastFlow Tours</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <rect x="2" y="2" width="20" height="20" rx="6" fill="#6366f1"/>
        <path d="M9.5 7.5v9l7-4.5-7-4.5z" fill="#fff"/>
      </svg>
      <span>CastFlow</span>
    </div>
    <div class="header-actions">
      <button id="btn-ai-generate" class="icon-btn" title="Generate tour with AI">
        <svg viewBox="0 0 24 24"><path d="M19 9l1.25-2.75L23 5l-2.75-1.25L19 1l-1.25 2.75L15 5l2.75 1.25M9 11l-3-6.5L3 11l3 6.5M19 15l-1.25 2.75L15 19l2.75 1.25L19 23l1.25-2.75L23 19l-2.75-1.25"/></svg>
      </button>
      <button id="btn-ai-settings" class="icon-btn" title="AI Settings">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1112 8.4a3.6 3.6 0 010 7.2z"/></svg>
      </button>
      <button id="btn-import" class="icon-btn" title="Import tour JSON">
        <svg viewBox="0 0 24 24"><path d="M5 20h14v-2H5v2zm7-18L5.33 9h3.34v4h5.33V9h3.34L12 2z"/></svg>
      </button>
      <button id="btn-export" class="icon-btn" title="Export all tours">
        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
      </button>
      <button id="btn-new" class="icon-btn primary" title="Create new tour">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      </button>
    </div>
  </header>

  <!-- PICKED SELECTOR BANNER -->
  <div id="picker-banner" class="picker-banner" style="display:none;">
    <span>🎯 <code id="picker-selector"></code></span>
    <button id="btn-picker-copy" class="text-btn">Copy</button>
    <button id="btn-picker-dismiss" class="text-btn" style="color:#6b7280;">✕</button>
  </div>

  <!-- TOUR LIST VIEW -->
  <div id="view-list">
    <div class="section-label" id="label-matching">
      <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/></svg>
      Tours for this page
    </div>
    <div id="list-matching" class="tour-list"></div>

    <div class="section-label" id="label-all">
      <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
      All tours
    </div>
    <div id="list-all" class="tour-list"></div>

    <div id="empty-state" class="empty-state" style="display:none;">
      <svg viewBox="0 0 24 24" width="40" height="40"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" fill="#6366f1" opacity="0.3"/></svg>
      <p>No tours yet. Create one or import a JSON file.</p>
    </div>
  </div>

  <!-- EDITOR VIEW -->
  <div id="view-editor" style="display:none;">
    <div class="editor-header">
      <button id="btn-back" class="icon-btn" title="Back to list">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <span id="editor-title">New Tour</span>
    </div>

    <div class="editor-body">
      <label class="field-label">Tour Name</label>
      <input type="text" id="ed-name" placeholder="e.g. Azure Portal Onboarding" />

      <label class="field-label">URL Pattern <span class="hint">glob — e.g. *://portal.azure.com/*</span></label>
      <input type="text" id="ed-url" placeholder="*://example.com/*" />

      <div class="row">
        <div class="col">
          <label class="field-label">Language</label>
          <select id="ed-lang">
            <option value="en-US">🇺🇸 English</option>
            <option value="es-ES">🇪🇸 Español</option>
            <option value="de-DE">🇩🇪 Deutsch</option>
            <option value="fr-FR">🇫🇷 Français</option>
          </select>
        </div>
        <div class="col">
          <label class="field-label">Speed</label>
          <select id="ed-speed">
            <option value="0.75">0.75x</option>
            <option value="1" selected>1x</option>
            <option value="1.25">1.25x</option>
            <option value="1.5">1.5x</option>
          </select>
        </div>
      </div>

      <label class="field-label">
        Scenes <span class="hint">JSON array</span>
        <button id="btn-validate-selectors" class="text-btn" title="Check selectors on page">✅ Validate</button>
        <button id="btn-pick-selector" class="text-btn" title="Pick element from page">🎯 Pick</button>
        <button id="btn-add-scene" class="text-btn" title="Add blank scene">+ Add scene</button>
      </label>
      <textarea id="ed-scenes" spellcheck="false" placeholder='[
  {
    "title": "Step 1",
    "text": "Description...",
    "element": "#css-selector",
    "position": "bottom"
  }
]'></textarea>
      <div id="ed-validation" class="ed-validation" style="display:none;"></div>
      <div id="ed-error" class="editor-error"></div>
    </div>

    <div class="editor-footer">
      <button id="btn-delete" class="btn danger">Delete</button>
      <div style="display:flex;gap:8px;">
        <button id="btn-cancel" class="btn secondary">Cancel</button>
        <button id="btn-save" class="btn primary">Save Tour</button>
      </div>
    </div>
  </div>

  <!-- AI SETTINGS VIEW -->
  <div id="view-ai-settings" style="display:none;">
    <div class="editor-header">
      <button id="btn-ai-back" class="icon-btn" title="Back to list">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <span>AI Settings</span>
    </div>
    <div class="editor-body">
      <label class="field-label">Provider</label>
      <select id="ai-provider">
        <option value="openai">OpenAI</option>
        <option value="azure">Azure OpenAI</option>
        <option value="gemini">Google Gemini</option>
        <option value="groq">Groq</option>
        <option value="mistral">Mistral</option>
        <option value="ollama">Ollama (local)</option>
        <option value="lmstudio">LM Studio (local)</option>
        <option value="custom">Custom (OpenAI-compatible)</option>
      </select>

      <label class="field-label">Endpoint URL</label>
      <input type="text" id="ai-endpoint" placeholder="https://..." />
      <div class="field-hint-text" id="ai-endpoint-hint"></div>

      <div class="ai-field" id="ai-key-field">
        <label class="field-label">API Key</label>
        <input type="password" id="ai-key" placeholder="API key" />
      </div>

      <div class="ai-field" id="ai-model-field">
        <label class="field-label">Model</label>
        <input type="text" id="ai-model" placeholder="gpt-4o-mini, llama3.1..." />
      </div>
    </div>
    <div class="editor-footer">
      <div></div>
      <div style="display:flex;gap:8px;">
        <button id="btn-ai-cancel" class="btn secondary">Cancel</button>
        <button id="btn-ai-save" class="btn primary">Save</button>
      </div>
    </div>
  </div>

  <!-- GENERATE TOUR VIEW -->
  <div id="view-generate" style="display:none;">
    <div class="editor-header">
      <button id="btn-gen-back" class="icon-btn" title="Back to list">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <span>Generate Tour with AI</span>
    </div>
    <div class="editor-body">
      <label class="field-label">Instructions <span class="hint">(optional — what should the tour cover?)</span></label>
      <textarea id="gen-prompt" rows="3" placeholder="e.g. Focus on the navigation menu and main actions for a new user..."></textarea>

      <label class="field-label">Language</label>
      <select id="gen-lang">
        <option value="">Auto (same as page)</option>
        <option value="en-US">🇺🇸 English</option>
        <option value="es-ES">🇪🇸 Español</option>
        <option value="de-DE">🇩🇪 Deutsch</option>
        <option value="fr-FR">🇫🇷 Français</option>
      </select>

      <div id="gen-status" class="gen-status" style="display:none;">
        <div class="spinner"></div>
        <span id="gen-status-text">Analyzing page...</span>
      </div>
      <div id="gen-error" class="editor-error"></div>
    </div>
    <div class="editor-footer">
      <div></div>
      <div style="display:flex;gap:8px;">
        <button id="btn-gen-cancel" class="btn secondary">Cancel</button>
        <button id="btn-gen-start" class="btn primary">✨ Generate</button>
      </div>
    </div>
  </div>

  <!-- Hidden file input for import -->
  <input type="file" id="file-input" accept=".json" style="display:none;" />

  <script src="popup.js"></script>
</body>
</html>
